name: CI/CD Pipeline for TypeScript API

on:
  push:
    branches:
      - feature/*
  workflow_dispatch:

jobs:
  validate_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check if tsconfig.json exists
        run: |
          if [ ! -f tsconfig.json ]; then
            echo "🚨 ERROR: tsconfig.json is missing. It is required for the build process."
            exit 1
          fi
        shell: bash

  build_and_test:
    runs-on: ubuntu-latest
    needs: validate_files
    env:
      NODE_VERSION: 18

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test

      - name: Build the application
        run: npm run build

      - name: Copy package-json and prisma to dist
        run: npm run postbuild

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: .

  notify_discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs:
      - validate_files
      - build_and_test
    if: always()

    steps:
      - name: Notify Discord - Failure
        if: |
          needs.validate_files.result == 'failure' ||
          needs.build_and_test.result == 'failure'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "username": "GitHub Actions",
            "content": "❌ **Pipeline FAILED**\n\n📦 **Repo:** ${{ github.repository }}\n🌿 **Branch:** ${{ github.ref_name }}\n👤 **Autor:** ${{ github.actor }}\n\n🔎 **Ver logs:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }'

      - name: Notify Discord - Success
        if: |
          needs.validate_files.result == 'success' &&
          needs.build_and_test.result == 'success'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "username": "GitHub Actions",
            "content": "✅ **Pipeline SUCCESS**\n\n📦 **Repo:** ${{ github.repository }}\n🌿 **Branch:** ${{ github.ref_name }}\n👤 **Autor:** ${{ github.actor }}\n\n🚀 **Execução:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }'


